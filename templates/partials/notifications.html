{% if messages %}
<div class="fixed top-4 right-4 z-50 space-y-2">
    {% for message in messages %}
    <div class="flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-2xl border animate-fade-in-right max-w-sm
        {% if message.tags == 'error' %}bg-rose-50 border-rose-200 text-rose-800
        {% elif message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
        {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
        {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            {% if message.tags == 'error' %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            {% elif message.tags == 'success' %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            {% elif message.tags == 'warning' %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            {% else %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            {% endif %}
        </svg>
        <p class="text-sm font-semibold">{{ message }}</p>
        <button onclick="this.parentElement.remove()" class="ml-auto hover:opacity-60">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}

<div id="notif-bell" class="relative group" x-data="{ open: false }">
    <button @click="open = !open" class="p-2.5 bg-slate-50 text-slate-400 hover:text-accent rounded-xl transition-all relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
        {% if notif_count > 0 %}
        <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-rose-500 border-2 border-white rounded-full"></span>
        {% endif %}
    </button>
    
    <!-- Dropdown -->
    <div x-show="open" @click.away="open = false" 
         class="absolute right-0 mt-3 w-80 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 overflow-hidden"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100">
        <div class="p-4 border-b bg-slate-50 flex items-center justify-between">
            <span class="text-xs font-black text-slate-800 uppercase tracking-widest">Notifications</span>
            <span class="text-[10px] font-bold text-slate-400">{{ notif_count }} New</span>
        </div>
        <div class="max-h-96 overflow-y-auto">
            {% for inv in overdue_list %}
            <div class="p-4 border-b hover:bg-slate-50 transition-colors flex items-start gap-3">
                <div class="w-8 h-8 bg-rose-100 text-rose-600 rounded-lg flex items-center justify-center shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-900 leading-tight">Invoice {{ inv.invoice_no }} is Overdue</p>
                    <p class="text-[10px] text-slate-400 mt-1 italic">₹{{ inv.net_amount }} from {{ inv.party.name }}</p>
                </div>
            </div>
            {% empty %}
            <div class="p-8 text-center text-slate-400 text-xs font-medium">No new alerts.</div>
            {% endfor %}
        </div>
        <div class="p-3 bg-slate-50 text-center">
            <button class="text-[10px] font-black text-accent uppercase tracking-widest">Mark all as read</button>
        </div>
    </div>
</div>
