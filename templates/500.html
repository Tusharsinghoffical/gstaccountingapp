{% extends "base.html" %}

{% block title %}Server Error - GST Accounting{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center space-y-6">
    <div class="w-32 h-32 bg-rose-50 text-rose-200 rounded-[2rem] flex items-center justify-center shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
    </div>
    <div>
        <h1 class="text-5xl font-black text-rose-900 tracking-tighter italic">500</h1>
        <p class="text-xl font-bold text-rose-600 mt-2">Something went wrong on our end.</p>
    </div>
    <p class="max-w-md text-slate-400 font-medium leading-relaxed">We've encountered an unexpected internal error. Our team has been notified. Please try refreshing or come back later.</p>
    <div class="flex gap-4">
        <button onclick="location.reload()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:bg-slate-800 transition-all">Reload Page</button>
        <a href="{% url 'index' %}" class="bg-white border border-slate-200 text-slate-600 px-8 py-4 rounded-2xl font-black hover:bg-slate-50 transition-all">Dashboard</a>
    </div>
</div>
{% endblock %}
